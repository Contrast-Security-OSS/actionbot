name: Test Actionbot Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  enforce-allow-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Check available credentials
        id: check-creds
        run: |
          [[ -n "$APP_KEY" ]] && echo "has-app-key=true" >> $GITHUB_OUTPUT || echo "has-app-key=false" >> $GITHUB_OUTPUT
          [[ -n "$PAT" ]] && echo "has-pat=true" >> $GITHUB_OUTPUT || echo "has-pat=false" >> $GITHUB_OUTPUT
        env:
          APP_KEY: ${{ secrets.ACTIONBOT_GITHUB_APP_PRIVATE_KEY }}
          PAT: ${{ secrets.GH_API_ACCESS_TOKEN }}

      - name: Generate GitHub App Token
        id: app-token
        if: steps.check-creds.outputs.has-app-key == 'true'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.ACTIONBOT_GITHUB_APP_ID }}
          private-key: ${{ secrets.ACTIONBOT_GITHUB_APP_PRIVATE_KEY }}
          owner: Contrast-Security-Inc

      - name: Validate credentials
        if: steps.check-creds.outputs.has-app-key == 'false' && steps.check-creds.outputs.has-pat == 'false'
        run: |
          echo "::error::No credentials available. Set either ACTIONBOT_GITHUB_APP_PRIVATE_KEY (preferred) or GH_API_ACCESS_TOKEN (legacy)."
          exit 1

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Actionbot v1.1.0 - Allow Policy
        id: Actionbot
        uses: Contrast-Security-OSS/actionbot@v1.1.0
        with:
          policy: 'allow'
          policy-url: 'https://github.com/Contrast-Security-Inc/labs-action-policy/blob/main/allow_policy.json'
          github-token: ${{ steps.app-token.outputs.token || secrets.GH_API_ACCESS_TOKEN }}
          fail-if-violations: 'true'

      - name: Respond to action policy violations
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: steps.Actionbot.outputs.violations
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.GH_API_ACCESS_TOKEN }}
          script: |
            const violations = JSON.parse(`${{ steps.Actionbot.outputs.violations || '[]' }}`);
            console.log('Violations found:', violations);
